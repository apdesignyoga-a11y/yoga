<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>יוגה בשיכון - הרשמה ותשלום</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary-green: #89a38b; --soft-green: #e9f0e9; --soft-brown: #a68a7b; --white: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Heebo', sans-serif; }
        body { background-color: var(--white); line-height: 1.6; }
        nav { background: var(--soft-brown); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-weight: 700; font-size: 1.5rem; color: var(--white); text-decoration: none; }
        section { padding: 60px 10%; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; margin-top: 40px; }
        .price-card { background: var(--soft-green); padding: 30px; border-radius: 20px; border: 1px solid #d0ddd0; display: flex; flex-direction: column; justify-content: space-between; }
        .price-name { font-size: 1.4rem; font-weight: 700; margin-bottom: 10px; }
        .price-amount { font-size: 2rem; color: var(--primary-green); font-weight: 700; margin-bottom: 20px; }
        .bit-btn { background-color: #00d1c1; color: white; padding: 15px; border-radius: 10px; text-decoration: none; font-weight: 700; transition: 0.3s; }
        .bit-btn:hover { background-color: #00b8a9; transform: scale(1.02); }
    </style>
</head>
<body>
    <nav><a href="index.html" class="logo">יוגה בשיכון</a></nav>
    <section>
        <h2 style="color: var(--primary-green); font-size: 2.2rem;">הצטרפות לשיעורים</h2>
        <div class="grid">
            <div class="price-card">
                <div>
                    <div class="price-name">מנוי חודשי - שיעור בשבוע</div>
                    <div class="price-amount">280 ₪</div>
                </div>
                <a href="https://www.bitpay.co.il/app/pay/972502006740" class="bit-btn">להרשמה לחודש הקרוב לחצו – כאן bit</a>
            </div>
            <div class="price-card">
                <div>
                    <div class="price-name">מנוי חודשי גמיש</div>
                    <div class="price-amount">300 ₪</div>
                    <p>(6 שיעורים בחודש)</p>
                </div>
                <a href="https://www.bitpay.co.il/app/pay/972502006740" class="bit-btn">להרשמה לחודש הקרוב לחצו – כאן bit</a>
            </div>
            <div class="price-card">
                <div>
                    <div class="price-name">מנוי חודשי – פעמיים בשבוע</div>
                    <div class="price-amount">400 ₪</div>
                </div>
                <a href="https://www.bitpay.co.il/app/pay/972502006740" class="bit-btn">להרשמה לחודש הקרוב לחצו – כאן bit</a>
            </div>
        </div>
        <br><br>
        <a href="index.html" style="color: var(--soft-brown); font-weight: 700;">חזרה לדף הבית</a>
    </section>
</body>
</html>
