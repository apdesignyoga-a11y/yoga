<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>יוגה בשיכון - דף נחיתה</title>
    <style>
        /* הגדרות בסיסיות לכל הדף */
        body {
            margin: 0;
            padding: 0;
            background-color: #fff; /* רקע לבן נקי */
            font-family: Arial, sans-serif; /* פונט ברירת מחדל */
            direction: rtl; /* כיוון RTL עברית */
            overflow: hidden; /* מניעת גלילה */
            height: 100vh;
        }

        /* הגדרת תמונת הרקע הכללית */
        .page-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('image_0.png'); /* שימוש בתמונה המקורית */
            background-size: cover;
            background-position: center;
            z-index: -1; /* מאחורי הכל */
        }

        /* --- סרגל ניווט עליון --- */
        header {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 20px 0;
            background-color: rgba(255, 255, 255, 0.9); /* רקע לבן מעט שקוף */
            z-index: 100;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 50px;
        }

        /* קישורי ניווט */
        .nav-links {
            display: flex;
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .nav-links li {
            margin-left: 20px; /* רווח בין קישורים */
        }

        .nav-links a {
            text-decoration: none;
            color: #4a4a4a;
            font-size: 16px;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: #38761d; /* ירוק ב-hover */
        }

        /* אייקון וואטסאפ קטן בסרגל הניווט */
        .whatsapp-icon-nav {
            margin-left: 5px;
            display: inline-block;
            vertical-align: middle;
        }

        /* הלוגו המרכזי בגופן דרוגולין */
        .logo {
            font-family: 'Drugulin Hebrew', serif; /* פונט דרוגולין המבוקש */
            font-size: 24px;
            color: #38761d; /* ירוק */
            text-align: center;
            margin: 0;
        }

        /* --- אזור ה-HERO המרכזי --- */
        #hero {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            direction: ltr; /* שמירה על קו תחתון מיושר */
        }

        /* שכבת הסוואה לבנה מעל הטקסט המקורי כדי להסתיר אותו */
        .text-mask {
            position: absolute;
            width: 400px; /* התאמת רוחב הכיסוי */
            height: 120px; /* התאמת גובה הכיסוי */
            background-color: #fff; /* צבע לבן להסתרה */
            z-index: 1; /* מעל הטקסט המקורי */
            /* שוליים רכים כדי להשתלב */
            box-shadow: 0 0 15px 15px #fff;
        }

        /* הטקסט המרכזי המעודכן בגופן דרוגולין */
        .hero-title {
            font-family: 'Drugulin Hebrew', serif; /* פונט דרוגולין המבוקש */
            font-size: 80px; /* גודל כותרת HERO */
            color: #38761d; /* ירוק */
            text-align: center;
            margin: 0;
            padding-bottom: 5px;
            border-bottom: 2px solid #38761d; /* קו תחתון */
            z-index: 2; /* מעל שכבת ההסוואה */
            position: relative;
        }

        /* --- סמל וואטסאפ צף --- */

            position: fixed;
            bottom: 30px;
            left: 30px;
            width: 60px;

            background-size: 35px;
            background-position: center;
            background-repeat: no-repeat;
            background-color: #25d366;
            border-radius: 50%;
            z-index: 1000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            text-indent: -9999px; /* הסתרת טקסט הנגישות */
        }

        .whatsapp-float:hover {
            transform: scale(1.1);
        }
    </style>
</head>
